apiVersion: apps/v1
kind: Deployment

metadata:
  name: spring-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: spring-app

  template:
    metadata:
      labels:
        app: spring-app

    spec:
      containers:
      - name: spring-container
        image: yourdockerhub/spring-app:latest

        ports:
        - containerPort: 8080